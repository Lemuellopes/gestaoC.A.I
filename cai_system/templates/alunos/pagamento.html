{% extends 'base.html' %}
{% block title %}Registrar Pagamento — C.A.I{% endblock %}
{% block page_title %}Registrar Pagamento{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-5">
    <div style="background:linear-gradient(135deg,#f0f7ff,#e0edff);border:1px solid #a8cff0;border-radius:14px;padding:18px 20px;margin-bottom:20px;display:flex;align-items:center;gap:14px;">
      <div class="avatar av-md av-ocean">{{ aluno.nome|first|upper }}</div>
      <div><div style="font-weight:700;font-size:15px;">{{ aluno.nome }}</div><code>{{ aluno.matricula }}</code></div>
    </div>
    <div class="card-surface">
      <div class="section-hd"><div class="section-hd-icon" style="background:#f0fdf4;color:#16a34a;"><i class="fas fa-dollar-sign"></i></div><div class="section-hd-title">Dados do Pagamento</div></div>
      <form method="post">
        {% csrf_token %}
        <div class="mb-3">
          <label class="form-label">Mensalidade *</label>
          <select name="mensalidade" class="form-select" required>
            <option value="">Selecione a mensalidade...</option>
            {% for m in mensalidades_pendentes %}
            <option value="{{ m.pk }}">{{ m.get_mes_display }}/{{ m.ano }} — R$ {{ m.valor_pendente|floatformat:2 }} pendente</option>
            {% endfor %}
          </select>
        </div>
        <div class="mb-3">
          <label class="form-label">Valor (R$) *</label>
          <input type="number" name="valor" class="form-control" step="0.01" min="0.01" required placeholder="0,00">
        </div>
        <div class="mb-4">
          <label class="form-label">Forma de Pagamento *</label>
          <select name="forma_pagamento" class="form-select" required>
            <option value="pix">PIX</option>
            <option value="dinheiro">Dinheiro</option>
            <option value="cartao_debito">Cartão de Débito</option>
            <option value="cartao_credito">Cartão de Crédito</option>
            <option value="transferencia">Transferência</option>
          </select>
        </div>
        <div style="display:flex;gap:10px;padding-top:16px;border-top:1px solid #f1f5f9;">
          <button type="submit" class="btn-cai btn-cai-success"><i class="fas fa-check me-1"></i>Confirmar Pagamento</button>
          <a href="{% url 'perfil_aluno' aluno.pk %}" class="btn-cai btn-cai-ghost">Cancelar</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
