{% extends 'base.html' %}
{% block title %}Registrar Pagamento — C.A.I{% endblock %}
{% block page_title %}Registrar Pagamento{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-6">
    <div class="card-cai mb-3" style="background:#e8f4fd;border:1px solid #1a6fb5;">
      <div class="d-flex align-items-center gap-3">
        <div class="avatar-circle" style="background:#1a6fb5;color:#fff;width:48px;height:48px;font-size:18px;">
          {{ aluno.nome|first|upper }}
        </div>
        <div>
          <div class="fw-bold">{{ aluno.nome }}</div>
          <div class="text-muted small">{{ aluno.matricula }}</div>
        </div>
      </div>
    </div>
    <div class="card-cai">
      <div class="section-title"><i class="fas fa-dollar-sign me-2 text-primary"></i>Registrar Pagamento</div>
      <form method="post">
        {% csrf_token %}
        <div class="mb-3">
          <label class="form-label fw-semibold" style="font-size:13px;">Mensalidade *</label>
          <select name="mensalidade" class="form-select" required>
            <option value="">Selecione...</option>
            {% for m in mensalidades_pendentes %}
            <option value="{{ m.pk }}">{{ m.get_mes_display }}/{{ m.ano }} — R$ {{ m.valor_pendente|floatformat:2 }} pendente</option>
            {% endfor %}
          </select>
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold" style="font-size:13px;">Valor (R$) *</label>
          <input type="number" name="valor" class="form-control" step="0.01" min="0.01" required>
        </div>
        <div class="mb-4">
          <label class="form-label fw-semibold" style="font-size:13px;">Forma de Pagamento *</label>
          <select name="forma_pagamento" class="form-select" required>
            <option value="pix">PIX</option>
            <option value="dinheiro">Dinheiro</option>
            <option value="cartao_debito">Cartão de Débito</option>
            <option value="cartao_credito">Cartão de Crédito</option>
            <option value="transferencia">Transferência</option>
          </select>
        </div>
        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-primary px-4" style="border-radius:8px;">
            <i class="fas fa-check me-2"></i>Confirmar Pagamento
          </button>
          <a href="{% url 'perfil_aluno' aluno.pk %}" class="btn btn-outline-secondary px-4" style="border-radius:8px;">Cancelar</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
