<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — C.A.I</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --blue: #1a6fb5;
      --blue-dark: #0f4d82;
      --yellow: #f5c400;
      --teal: #00a8b5;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0a3560 0%, #1a6fb5 50%, #00a8b5 100%);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Inter', sans-serif;
      position: relative; overflow: hidden;
    }
    /* Decorative circles */
    body::before {
      content: '';
      position: absolute; width: 500px; height: 500px;
      border-radius: 50%; border: 80px solid rgba(255,255,255,.06);
      top: -150px; right: -150px;
    }
    body::after {
      content: '';
      position: absolute; width: 300px; height: 300px;
      border-radius: 50%; border: 60px solid rgba(255,255,255,.06);
      bottom: -80px; left: -80px;
    }
    .login-card {
      background: #fff;
      border-radius: 20px;
      padding: 44px 40px;
      width: 100%; max-width: 420px;
      box-shadow: 0 24px 60px rgba(0,0,0,.25);
      position: relative; z-index: 1;
    }
    .login-logo {
      text-align: center; margin-bottom: 32px;
    }
    .logo-badge {
      display: inline-flex; align-items: center; justify-content: center;
      width: 64px; height: 64px; border-radius: 16px;
      background: var(--blue-dark); margin: 0 auto 12px;
    }
    .logo-badge span {
      font-family: 'Nunito', sans-serif;
      font-weight: 900; font-size: 16px;
      color: var(--yellow); letter-spacing: .5px;
    }
    .login-title {
      font-family: 'Nunito', sans-serif;
      font-size: 22px; font-weight: 800;
      color: #1a202c; text-align: center;
    }
    .login-subtitle {
      font-size: 13px; color: #718096;
      text-align: center; margin-top: 4px;
    }
    .form-label {
      font-size: 13px; font-weight: 600; color: #4a5568;
      margin-bottom: 6px;
    }
    .form-control {
      border-radius: 10px; border: 1.5px solid #e2e8f0;
      padding: 10px 14px; font-size: 14px;
      transition: border-color .2s, box-shadow .2s;
    }
    .form-control:focus {
      border-color: var(--blue); box-shadow: 0 0 0 3px rgba(26,111,181,.12);
    }
    .btn-login {
      width: 100%; padding: 12px;
      background: linear-gradient(135deg, var(--blue) 0%, var(--blue-dark) 100%);
      color: #fff; border: none; border-radius: 10px;
      font-size: 15px; font-weight: 700; font-family: 'Nunito', sans-serif;
      cursor: pointer; transition: opacity .2s, transform .15s;
      margin-top: 8px;
    }
    .btn-login:hover { opacity: .92; transform: translateY(-1px); }
    .alert-danger {
      border-radius: 10px; font-size: 13.5px;
      border: none; background: #fdecea; color: #c0392b;
    }
    .wave-footer {
      text-align: center; margin-top: 24px;
      font-size: 12px; color: rgba(255,255,255,.6);
      position: relative; z-index: 1;
    }
    .wave-footer strong { color: rgba(255,255,255,.9); }
  </style>
</head>
<body>
  <div>
    <div class="login-card">
      <div class="login-logo">
        <div class="logo-badge">
          <span>C.A.I</span>
        </div>
        <div class="login-title">Sistema Administrativo</div>
        <div class="login-subtitle">Centro Aquático Infantil — Instituto Tia Duda</div>
      </div>

      {% if form.errors %}
      <div class="alert alert-danger mb-3">
        <i class="fas fa-exclamation-circle me-2"></i>
        Usuário ou senha inválidos. Tente novamente.
      </div>
      {% endif %}

      <form method="post">
        {% csrf_token %}
        <div class="mb-3">
          <label class="form-label">Usuário</label>
          <input type="text" name="username" class="form-control" placeholder="Digite seu usuário" autofocus required>
        </div>
        <div class="mb-4">
          <label class="form-label">Senha</label>
          <input type="password" name="password" class="form-control" placeholder="Digite sua senha" required>
        </div>
        <button type="submit" class="btn-login">
          <i class="fas fa-sign-in-alt me-2"></i> Entrar
        </button>
        {% if next %}
        <input type="hidden" name="next" value="{{ next }}">
        {% endif %}
      </form>
    </div>
    <div class="wave-footer">
      <strong>C.A.I</strong> — Centro Aquático Infantil &nbsp;|&nbsp; Instituto Tia Duda
    </div>
  </div>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
</body>
</html>
